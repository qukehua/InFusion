dataset: 'harper3d'
# 30hz: 25帧 = 0.83秒历史, 100帧 = 3.33秒预测
t_his: 25
t_pred: 100
batch_size: 64
eval_batch_size: 64  # chunked eval to avoid OOM during DDIM sampling
num_epoch: 101
# scaled from [100, 200, 300, 400, 500] for a 101-epoch run
milestone: [20, 40, 60, 80, 100]
save_model_interval: 20
num_data_sample: 50000
num_val_data_sample: 5000
lr: 3.e-4  #original
# lr: 2.e-4
n_pre: 20
# Set to 'auto' to auto-construct based on fps
multimodal_path: '/data3/user/qkh/DATASET/TransFusion/HARPER/t_his25_30hz_thre0.500_t_pred100_thre0.100_filtered.npz'
data_candi_path: '/data3/user/qkh/DATASET/TransFusion/HARPER/data_candi_30hz_t_his25_t_pred100_skiprate20.npz'
padding: 'LastFrame'
Complete: True
noise_steps: 1000
ddim_timesteps: 100
scheduler: 'Cosine'  # 'Cosine' 'Linear' 'Sqrt' 'Sigmoid' 'Logarithmic'
model_variant: 'two_stage'  # 'default' or 'two_stage'
stage1_num_layers: 2  # Stage 1: Block 1-2, Stage 2: Block 3-9
num_layers: 9
num_heads: 8
latent_dims: 512
dropout: 0.2     #original
# dropout: 0.1
# mod_train: 0.8   #original
mod_train: 0.8 
mod_test: 1.0
dct_norm_enable: False
disable_tensorboard: True
# Harper3D specific settings
include_spot: False
use_spot_condition: False
predict_human_only: True
data_path: '/data3/user/qkh/HARPER/HARPER _3D panoptic'
fps: '30hz'

